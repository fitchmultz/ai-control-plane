{{/*
Service Account

Responsibilities:
  - Creates a dedicated service account for the AI Control Plane
  - Applies custom annotations (e.g., for IRSA on AWS, Workload Identity on GKE)

Non-scope:
  - Does NOT create RBAC roles/clusterroles (add if needed for specific features)
*/}}
{{- if .Values.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "acp.serviceAccountName" . }}
  labels:
    {{- include "acp.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
automountServiceAccountToken: {{ .Values.serviceAccount.automountServiceAccountToken }}
{{- end }}
