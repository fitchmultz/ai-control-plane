{{/*
Chargeback Scripts ConfigMap

Responsibilities:
  - Provide chargeback_report.sh script to CronJob containers
  - Provide supporting libraries for chargeback reporting
  - Ensure script availability without requiring image rebuilds

Non-scope:
  - Does NOT contain sensitive configuration (use Secrets)
  - Does NOT manage script versions (updated via Helm releases)
*/}}
{{- if .Values.chargeback.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "acp.fullname" . }}-chargeback-scripts
  labels:
    {{- include "acp.labels" . | nindent 4 }}
    app.kubernetes.io/component: chargeback
data:
  chargeback_report.sh: |
{{ .Files.Get "files/chargeback_report.sh" | indent 4 }}
  lib/chargeback_db.sh: |
{{ .Files.Get "files/lib/chargeback_db.sh" | indent 4 }}
  lib/chargeback_analysis.sh: |
{{ .Files.Get "files/lib/chargeback_analysis.sh" | indent 4 }}
  lib/chargeback_render.sh: |
{{ .Files.Get "files/lib/chargeback_render.sh" | indent 4 }}
  lib/chargeback_io.sh: |
{{ .Files.Get "files/lib/chargeback_io.sh" | indent 4 }}
{{- end }}
