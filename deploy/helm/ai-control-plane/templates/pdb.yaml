{{/*
Pod Disruption Budget (PDB)

Responsibilities:
  - Ensures minimum availability during voluntary disruptions (node drains, etc.)
  - Prevents all LiteLLM pods from being evicted simultaneously

Non-scope:
  - Does NOT protect against involuntary disruptions (node failures, etc.)
*/}}
{{- if .Values.podDisruptionBudget.enabled }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ include "acp.fullname" . }}-litellm
  labels:
    {{- include "acp.litellmLabels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      {{- include "acp.litellmSelectorLabels" . | nindent 6 }}
  {{- if .Values.podDisruptionBudget.minAvailable }}
  minAvailable: {{ .Values.podDisruptionBudget.minAvailable }}
  {{- end }}
  {{- if .Values.podDisruptionBudget.maxUnavailable }}
  maxUnavailable: {{ .Values.podDisruptionBudget.maxUnavailable }}
  {{- end }}
{{- end }}
