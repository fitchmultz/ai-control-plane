{{/*
PostgreSQL StatefulSet

Responsibilities:
  - Deploys PostgreSQL 18 as a StatefulSet for data persistence
  - Creates PVC for data storage
  - Provides health checks via pg_isready

Non-scope:
  - Does NOT provide HA/replication (single instance only)
  - Does NOT handle automated backups (use external tools)
  - Schema is auto-created by LiteLLM on first connection

Note: PostgreSQL cannot use cap_drop: ALL due to chown/chmod requirements
for volume initialization. no-new-privileges provides security boundary.
*/}}
{{- if .Values.postgres.enabled }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "acp.fullname" . }}-postgres
  labels:
    {{- include "acp.postgresLabels" . | nindent 4 }}
spec:
  serviceName: {{ include "acp.postgresService" . }}
  replicas: 1
  selector:
    matchLabels:
      {{- include "acp.postgresSelectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "acp.postgresSelectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        fsGroup: 999  # postgres group
      containers:
        - name: postgres
          image: "{{ .Values.postgres.image.repository }}@{{ .Values.postgres.image.digest }}"
          imagePullPolicy: {{ .Values.postgres.image.pullPolicy }}
          ports:
            - name: postgres
              containerPort: 5432
              protocol: TCP
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: {{ include "acp.fullname" . }}-postgres
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "acp.fullname" . }}-postgres
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: {{ include "acp.fullname" . }}-postgres
                  key: POSTGRES_DB
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          {{- if .Values.postgres.healthCheck.enabled }}
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - $(POSTGRES_USER)
                - -d
                - $(POSTGRES_DB)
            initialDelaySeconds: {{ .Values.postgres.healthCheck.initialDelaySeconds }}
            periodSeconds: {{ .Values.postgres.healthCheck.periodSeconds }}
            timeoutSeconds: {{ .Values.postgres.healthCheck.timeoutSeconds }}
            failureThreshold: {{ .Values.postgres.healthCheck.failureThreshold }}
          livenessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - $(POSTGRES_USER)
                - -d
                - $(POSTGRES_DB)
            initialDelaySeconds: {{ add .Values.postgres.healthCheck.initialDelaySeconds 10 }}
            periodSeconds: {{ .Values.postgres.healthCheck.periodSeconds }}
            timeoutSeconds: {{ .Values.postgres.healthCheck.timeoutSeconds }}
            failureThreshold: {{ .Values.postgres.healthCheck.failureThreshold }}
          {{- end }}
          resources:
            {{- toYaml .Values.postgres.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            seccompProfile:
              type: RuntimeDefault
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: data
          {{- if .Values.postgres.persistence.enabled }}
          persistentVolumeClaim:
            claimName: data-{{ include "acp.fullname" . }}-postgres-0
          {{- else }}
          emptyDir: {}
          {{- end }}
---
{{- if .Values.postgres.persistence.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: data-{{ include "acp.fullname" . }}-postgres-0
  labels:
    {{- include "acp.postgresLabels" . | nindent 4 }}
spec:
  accessModes:
    - {{ .Values.postgres.persistence.accessMode }}
  resources:
    requests:
      storage: {{ .Values.postgres.persistence.size }}
  {{- with .Values.postgres.persistence.storageClass }}
  storageClassName: {{ . }}
  {{- end }}
{{- end }}
{{- end }}
