{{/*
AI Control Plane Secrets

Responsibilities:
  - Creates Kubernetes Secrets for LiteLLM master key, salt key, and database
  - Only created when secrets.create is true

Non-scope:
  - Does NOT create secrets when secrets.create is false (use existing secrets)
  - Secrets should NOT be committed to Git

WARNING: Using secrets.create with literal values is NOT recommended for production.
Use external secrets management (External Secrets Operator, Vault, etc.) for production.
*/}}
{{- if .Values.secrets.create }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "acp.fullname" . }}-litellm
  labels:
    {{- include "acp.labels" . | nindent 4 }}
type: Opaque
data:
  LITELLM_MASTER_KEY: {{ .Values.secrets.litellm.masterKey | b64enc }}
  LITELLM_SALT_KEY: {{ .Values.secrets.litellm.saltKey | b64enc }}
  {{- if not .Values.postgres.enabled }}
  {{- if .Values.secrets.externalDatabaseUrl }}
  DATABASE_URL: {{ .Values.secrets.externalDatabaseUrl | b64enc }}
  {{- end }}
  {{- end }}
{{- end }}

---
{{- if .Values.postgres.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "acp.fullname" . }}-postgres
  labels:
    {{- include "acp.labels" . | nindent 4 }}
type: Opaque
data:
  POSTGRES_USER: {{ .Values.postgres.auth.username | b64enc }}
  POSTGRES_PASSWORD: {{ .Values.postgres.auth.password | b64enc }}
  POSTGRES_DB: {{ .Values.postgres.auth.database | b64enc }}
  DATABASE_URL: {{ include "acp.embeddedDatabaseUrl" . | b64enc }}
{{- end }}
