# AI Control Plane - Ansible Configuration
#
# Purpose: Ansible configuration for host-first declarative deployment
#          of AI Control Plane gateway hosts.
#
# Responsibilities:
#   - Define Ansible behavior for ACP deployments
#   - Set reasonable defaults for single-gateway deployments
#   - Enable idempotent convergence patterns
#
# Non-scope:
#   - Does NOT define inventory (use -i inventory/)
#   - Does NOT contain secrets (use env vars or vault)

[defaults]
# Default inventory file (override with -i)
inventory = ./inventory/hosts.yml

# Don't check host keys for new hosts (set to True for production)
host_key_checking = False

# Disable retry files (we handle idempotency in playbooks)
retry_files_enabled = False

# Use YAML callback for better readability
stdout_callback = yaml

# Enable timing info
bin_ansible_callbacks = True

# Gather minimal facts by default (we gather what we need explicitly)
gathering = explicit

# Timeout for connections
timeout = 30

# Number of parallel forks (single gateway = 1)
forks = 1

# Disable cowsay for cleaner output
nocows = 1

[privilege_escalation]
# Default to no privilege escalation (assume ssh as user with docker access)
become = False

[ssh_connection]
# Control persistence for faster repeated connections
ssh_args = -o ControlMaster=auto -o ControlPersist=60s -o StrictHostKeyChecking=no

# Native SSH pipelining for performance
pipelining = True

# Retries for SSH connections
retries = 3
