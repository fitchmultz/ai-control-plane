# AI Control Plane - Ansible Configuration
#
# Purpose: Ansible configuration for the supported host-first declarative
#          deployment workflow.
#
# Responsibilities:
#   - Define secure default Ansible behavior for ACP deployments.
#   - Favor deterministic, production-defensible SSH handling.
#   - Keep single-gateway convergence runs readable and predictable.
#
# Non-scope:
#   - Does NOT define inventory content (use -i inventory/...)
#   - Does NOT contain secrets (use env files or vault)

[defaults]
# Default inventory file (override with -i)
inventory = ./inventory/hosts.yml

# Production-defensible host automation must verify host keys.
host_key_checking = True

# Disable retry files (we handle idempotency in playbooks)
retry_files_enabled = False

# Use YAML callback for better readability
stdout_callback = yaml

# Enable timing info
bin_ansible_callbacks = True

# Gather minimal facts by default (playbooks opt in explicitly)
gathering = explicit

# Timeout for connections
timeout = 30

# Number of parallel forks (single gateway = 1)
forks = 1

# Disable cowsay for cleaner output
nocows = 1

[privilege_escalation]
# Playbooks opt into become where privileged host hardening is required.
become = False

[ssh_connection]
# Control persistence for faster repeated connections
ssh_args = -o ControlMaster=auto -o ControlPersist=60s

# Native SSH pipelining for performance
pipelining = True

# Retries for SSH connections
retries = 3
