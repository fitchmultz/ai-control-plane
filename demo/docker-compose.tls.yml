# Docker Compose override for TLS/HTTPS support
#
# Purpose: Add Caddy reverse proxy with automatic HTTPS/TLS
# Usage: docker compose -f docker-compose.yml -f docker-compose.tls.yml up -d
# Or: make up-tls
#
# This is an OPTIONAL override. The base docker-compose.yml provides HTTP-only
# access which is suitable for local development and testing.
#
# Security Features:
# - Automatic HTTPS with Let's Encrypt (production) or self-signed (dev)
# - OAuth token protection (headers not logged by default)
# - Security headers (HSTS, X-Frame-Options, etc.)
# - Least-privilege container hardening
#
# Documentation: docs/deployment/TLS_SETUP.md
# Contract: docs/deployment/SINGLE_TENANT_PRODUCTION_CONTRACT.md

# =============================================================================
# YAML Anchors - Shared Configuration
# =============================================================================

x-acp-logging: &acp-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

x-acp-security-defaults: &acp-security-defaults
  security_opt:
    - no-new-privileges:true
  cap_drop:
    - ALL
  init: true

x-acp-labels: &acp-labels
  acp.slot: "${ACP_SLOT:-active}"
  acp.release_id: "${ACP_RELEASE_ID:-dev}"

# =============================================================================
# Services
# =============================================================================

services:
  caddy:
    # Caddy needs NET_BIND_SERVICE for 80/443. Do not inherit no-new-privileges
    # here because Caddy's file capabilities can fail with EPERM under NNP.
    init: true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    # Pinned to prevent drift (latest published official Docker image on 2026-03-06)
    image: caddy:2.11.1-alpine@sha256:3b2a0196e0687279c14c27adff9fc6b44acfa318dbb97eaebe385bdf99e5364c
    ports:
      # HTTP port (for ACME challenge and redirect)
      # Bind to CADDY_PUBLISH_HOST (default: 127.0.0.1 for security)
      - "${CADDY_PUBLISH_HOST:-127.0.0.1}:${CADDY_HTTP_HOST_PORT:-80}:80"
      # HTTPS port (main gateway endpoint)
      - "${CADDY_PUBLISH_HOST:-127.0.0.1}:${CADDY_HTTPS_HOST_PORT:-443}:443"
    volumes:
      # Mount Caddyfile (configurable via CADDYFILE_PATH env var)
      - ${CADDYFILE_PATH:-./config/caddy/Caddyfile.dev}:/etc/caddy/Caddyfile:ro
      # Persistent storage for certificates and configuration
      - caddy_data:/data
      - caddy_config:/config
      # Log directory (shared with LiteLLM for centralized logging)
      - ./logs/${ACP_SLOT:-active}/caddy:/var/log/caddy
    environment:
      # ACME CA selection (internal for dev, Let's Encrypt for prod)
      - CADDY_ACME_CA=${CADDY_ACME_CA:-internal}
      # Domain for Let's Encrypt (production only)
      - CADDY_DOMAIN=${CADDY_DOMAIN:-}
      # Email for Let's Encrypt notifications
      - CADDY_EMAIL=${CADDY_EMAIL:-}
    restart: unless-stopped
    logging: *acp-logging
    labels: *acp-labels
    networks:
      - default
    # Health check for Caddy
    healthcheck:
      test: ["CMD", "caddy", "validate", "--config", "/etc/caddy/Caddyfile"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    depends_on:
      litellm:
        condition: service_healthy

  litellm:
    command:
      - "--host"
      - "0.0.0.0"
      - "--config"
      - "/app/config.yaml"
      - "--port"
      - "4000"
      - "--num_workers"
      - "2"
    environment:
      # Signal that we're behind a reverse proxy
      - LITELLM_BEHIND_PROXY=true
      # Set the public URL (clients will connect to Caddy)
      - LITELLM_PUBLIC_URL=${LITELLM_PUBLIC_URL:-https://localhost}
    # Note: In split-host mode (ACP_DATABASE_MODE=external), the postgres
    # service is not started. LiteLLM connects to external DB via DATABASE_URL.

# =============================================================================
# Volumes
# =============================================================================

volumes:
  # Caddy data volume (certificates, private keys) - slot-scoped
  # IMPORTANT: These volumes persist certificates. Backup before running make clean.
  caddy_data:
    driver: local
    name: ai_control_plane_caddy_data_${ACP_SLOT:-active}

  caddy_data_active:
    driver: local
    name: ai_control_plane_caddy_data_active

  caddy_data_standby:
    driver: local
    name: ai_control_plane_caddy_data_standby

  # Caddy configuration state - slot-scoped
  caddy_config:
    driver: local
    name: ai_control_plane_caddy_config_${ACP_SLOT:-active}

  caddy_config_active:
    driver: local
    name: ai_control_plane_caddy_config_active

  caddy_config_standby:
    driver: local
    name: ai_control_plane_caddy_config_standby
