# AI Control Plane - Base Docker Compose Configuration
#
# Purpose:
#   - Define the minimal supported host-first runtime for the AI Control Plane.
#
# Responsibilities:
#   - Run the LiteLLM gateway and embedded PostgreSQL baseline.
#   - Keep the default runtime narrow, truthful, and localhost-bound.
#
# Scope:
#   - Base host-first runtime only. Optional overlays live in separate compose
#     files for DLP, managed UI, offline mode, and TLS.
#
# Usage:
#   - make up
#   - make up-production
#   - make up-tls
#
# Invariants/Assumptions:
#   - The default supported stack is LiteLLM plus PostgreSQL only.
#   - Compose env values come from ACP_RUNTIME_ENV_FILE when provided.

x-acp-logging: &acp-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

x-acp-security-defaults: &acp-security-defaults
  security_opt:
    - no-new-privileges:true
  cap_drop:
    - ALL
  init: true

x-acp-labels: &acp-labels
  acp.slot: "${ACP_SLOT:-active}"
  acp.release_id: "${ACP_RELEASE_ID:-dev}"

services:
  postgres:
    profiles: ["embedded-db"]
    security_opt:
      - no-new-privileges:true
    init: true
    image: cgr.dev/chainguard/postgres@sha256:84fb13a5e182f249a2d739fbb4f44f78a2efa4b873c0407e3211b464f35af382
    env_file:
      - ${ACP_RUNTIME_ENV_FILE:-.env}
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required in the runtime env file}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required in the runtime env file}
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required in the runtime env file}
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    logging: *acp-logging
    labels: *acp-labels
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  litellm:
    <<: *acp-security-defaults
    image: ${LITELLM_IMAGE:-ghcr.io/fitchmultz/acp/litellm-hardened:20260212@sha256:6485f5d438ab23399903bfcd83d352b4cf50bcc63d87a252a423f99c5c132801}
    pull_policy: ${ACP_PULL_POLICY:-missing}
    env_file:
      - ${ACP_RUNTIME_ENV_FILE:-.env}
    environment:
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY:?LITELLM_MASTER_KEY is required in the runtime env file}
      LITELLM_SALT_KEY: ${LITELLM_SALT_KEY:?LITELLM_SALT_KEY is required in the runtime env file}
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required in the runtime env file}
    ports:
      - "${LITELLM_PUBLISH_HOST:-127.0.0.1}:${LITELLM_HOST_PORT:-4000}:4000"
    volumes:
      - ./config/${LITELLM_CONFIG_FILE:-litellm.yaml}:/app/config.yaml:ro
      - ./logs/${ACP_SLOT:-active}/litellm:/var/log/litellm
    command: ["--config", "/app/config.yaml", "--port", "4000", "--num_workers", "2"]
    restart: unless-stopped
    logging: *acp-logging
    labels: *acp-labels
    healthcheck:
      test: ["CMD", "python", "-c", "import os, urllib.request, urllib.error, sys;\nkey = os.getenv('LITELLM_MASTER_KEY', '').strip();\nif not key:\n    sys.exit(1)\nreq = urllib.request.Request('http://127.0.0.1:4000/health', headers={'Authorization': f'Bearer {key}'});\ntry:\n    urllib.request.urlopen(req);\n    sys.exit(0)\nexcept urllib.error.HTTPError as e:\n    sys.exit(0) if e.code == 200 else sys.exit(1)\nexcept Exception:\n    sys.exit(1)"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 60s

  otel-collector:
    <<: *acp-security-defaults
    profiles: ["production"]
    image: otel/opentelemetry-collector-contrib:0.147.0@sha256:e7c92c715f28ff142f3bcaccd4fc5603cf4c71276ef09954a38eb4038500a5a5
    command: ["--config=/etc/otel-collector/${OTEL_COLLECTOR_CONFIG_FILE:-config.yaml}"]
    volumes:
      - ./config/otel-collector/config.yaml:/etc/otel-collector/config.yaml:ro
      - ./config/otel-collector/config.production.yaml:/etc/otel-collector/config.production.yaml:ro
      - ./logs/${ACP_SLOT:-active}/otel:/var/log/otel
    ports:
      - "127.0.0.1:${OTEL_GRPC_HOST_PORT:-4317}:4317"
      - "127.0.0.1:${OTEL_HTTP_HOST_PORT:-4318}:4318"
      - "127.0.0.1:${OTEL_HEALTH_HOST_PORT:-13133}:13133"
    environment:
      OTEL_RESOURCE_ENVIRONMENT: ${OTEL_RESOURCE_ENVIRONMENT:-demo}
      OTEL_RESOURCE_DEPLOYMENT: ${OTEL_RESOURCE_DEPLOYMENT:-local}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      OTEL_EXPORTER_OTLP_PROTOCOL: ${OTEL_EXPORTER_OTLP_PROTOCOL:-http/protobuf}
      OTEL_EXPORTER_OTLP_AUTH_HEADER: ${OTEL_EXPORTER_OTLP_AUTH_HEADER:-}
      OTEL_RECEIVER_BIND_ADDRESS: ${OTEL_RECEIVER_BIND_ADDRESS:-127.0.0.1}
      OTEL_HEALTH_BIND_ADDRESS: ${OTEL_HEALTH_BIND_ADDRESS:-127.0.0.1}
      OTEL_MEMORY_LIMIT_MIB: ${OTEL_MEMORY_LIMIT_MIB:-256}
      OTEL_BATCH_SIZE: ${OTEL_BATCH_SIZE:-512}
      OTEL_TRACES_SAMPLING_PERCENT: ${OTEL_TRACES_SAMPLING_PERCENT:-10}
    restart: unless-stopped
    logging: *acp-logging
    labels: *acp-labels
    healthcheck:
      test: ["CMD", "/otelcol-contrib", "validate", "--config=/etc/otel-collector/${OTEL_COLLECTOR_CONFIG_FILE:-config.yaml}"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  pgdata:
    name: ai_control_plane_pgdata_${ACP_SLOT:-active}
