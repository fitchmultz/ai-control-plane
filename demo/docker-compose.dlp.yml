# AI Control Plane - DLP Overlay Compose Configuration
#
# Purpose:
#   - Add optional Presidio services for deterministic DLP enforcement.
#
# Responsibilities:
#   - Provide Presidio analyzer and anonymizer services for the DLP overlay.
#
# Scope:
#   - DLP overlay only. Combine with demo/docker-compose.yml.
#
# Usage:
#   - make up-dlp
#   - make up-full
#
# Invariants/Assumptions:
#   - The base stack remains supported without this overlay.

x-acp-logging: &acp-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

x-acp-security-defaults: &acp-security-defaults
  security_opt:
    - no-new-privileges:true
  cap_drop:
    - ALL
  init: true

services:
  presidio-analyzer:
    <<: *acp-security-defaults
    image: mcr.microsoft.com/presidio-analyzer:2.2.361@sha256:7e0d954193e820bc3b63e11af4897887ffa88639e368b1e252051f38e3c714cb
    expose:
      - "3000"
    restart: unless-stopped
    logging: *acp-logging
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:3000/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

  presidio-anonymizer:
    <<: *acp-security-defaults
    image: mcr.microsoft.com/presidio-anonymizer:2.2.361@sha256:022fc4bb42cd43b0c27526b6a0394b2b14aaf4b972a4814845eb8b48761bee7b
    expose:
      - "3000"
    restart: unless-stopped
    logging: *acp-logging
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:3000/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
