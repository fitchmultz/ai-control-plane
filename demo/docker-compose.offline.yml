# AI Control Plane - Offline Overlay Compose Configuration
#
# Purpose:
#   - Add the deterministic mock-upstream overlay used by offline host-first runs.
#
# Responsibilities:
#   - Provide a local OpenAI-compatible upstream for offline demos and CI.
#
# Scope:
#   - Offline overlay only. Combine with demo/docker-compose.yml.
#
# Usage:
#   - make up-offline
#   - make up-offline-ci
#
# Invariants/Assumptions:
#   - This overlay does not broaden the supported default stack.

x-acp-logging: &acp-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

services:
  mock-upstream:
    build:
      context: ./mock_upstream
      dockerfile: Dockerfile
    environment:
      - PORT=8080
      - MOCK_LATENCY_MS=100
      - MOCK_TOKENS_PER_CHAR=0.25
    expose:
      - "8080"
    restart: unless-stopped
    logging: *acp-logging
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
