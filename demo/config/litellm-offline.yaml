# =============================================================================
# AI Control Plane - Offline LiteLLM Configuration
# =============================================================================
# Purpose:
#   - Define the supported offline host-first LiteLLM baseline without
#     optional DLP.
#
# Responsibilities:
#   - Publish the approved offline aliases that route to the mock upstream.
#   - Preserve the same gateway budgeting and attribution defaults as the
#     base runtime.
#
# Scope:
#   - Offline overlay only. Mounted by make up-offline and make up-offline-ci.
#
# Usage:
#   - Selected by LITELLM_CONFIG_FILE=litellm-offline.yaml.
#
# Invariants/Assumptions:
#   - Approved aliases are mirrored from demo/config/model_catalog.yaml.
#   - Offline mode does not require provider API keys.

---
model_list:
  - model_name: mock-gpt
    litellm_params:
      model: openai/mock-gpt
      api_base: http://mock-upstream:8080/v1
      api_key: "fake-key-not-used"
    rpm: 60
    tpm: 90000

  - model_name: mock-claude
    litellm_params:
      model: openai/mock-claude
      api_base: http://mock-upstream:8080/v1
      api_key: "fake-key-not-used"
    rpm: 60
    tpm: 90000

general_settings:
  database_url: os.environ/DATABASE_URL
  forward_client_headers_to_llm_api: true

litellm_settings:
  redact_user_api_key_info: true
  master_key: os.environ/LITELLM_MASTER_KEY
  set_verbose: false
  max_budget: 100.0
  budget_duration: 30d
  max_parallel_requests: 100
  max_internal_user_budget: 10.0
  internal_user_budget_duration: 7d
  proxy_budget_rescheduler_min_time: 1
  proxy_budget_rescheduler_max_time: 1
