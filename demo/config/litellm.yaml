# =============================================================================
# AI Control Plane - Base LiteLLM Configuration
# =============================================================================
# Purpose:
#   - Define the supported host-first LiteLLM baseline without optional
#     overlays.
#
# Responsibilities:
#   - Publish the approved online model aliases for the supported base runtime.
#   - Enforce gateway budgets, attribution, and metadata-only governance
#     defaults.
#
# Scope:
#   - Base runtime only. Optional DLP guardrails live in litellm-dlp.yaml.
#
# Usage:
#   - Mounted by make up, make up-ui, make up-production, and make up-tls.
#
# Invariants/Assumptions:
#   - Approved aliases are mirrored from demo/config/model_catalog.yaml.
#   - The base runtime must remain functional without Presidio services.

---
model_list:
  - model_name: openai-gpt5.2
    litellm_params:
      model: openai/gpt-5.2
      api_key: os.environ/OPENAI_API_KEY
    rpm: 60
    tpm: 90000

  - model_name: claude-sonnet-4-5
    litellm_params:
      model: anthropic/claude-sonnet-4-5
      api_key: os.environ/ANTHROPIC_API_KEY

  - model_name: claude-haiku-4-5
    litellm_params:
      model: anthropic/claude-haiku-4-5
      api_key: os.environ/ANTHROPIC_API_KEY

general_settings:
  database_url: os.environ/DATABASE_URL
  forward_client_headers_to_llm_api: true

litellm_settings:
  redact_user_api_key_info: true
  master_key: os.environ/LITELLM_MASTER_KEY
  set_verbose: false
  max_budget: 100.0
  budget_duration: 30d
  max_parallel_requests: 100
  max_internal_user_budget: 10.0
  internal_user_budget_duration: 7d
  proxy_budget_rescheduler_min_time: 1
  proxy_budget_rescheduler_max_time: 1
